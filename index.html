    --gold-light: #e8c88a;
    --text-dark: #2d2420;
    --text-mid: #6b5c4e;

  /* ── LANG SELECTOR SCREEN ── */
  #lang-screen {

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    background: linear-gradient(160deg, #f9f4ec 0%, #ede4d4 60%, #ddd0bc 100%);
    position: relative;
    overflow: hidden;
  }

  #lang-screen::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  #lang-screen::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.7s ease both;
  }

  .logo-wrap .brand {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 10vw, 4.5rem);
    color: var(--dark-brown);
    letter-spacing: -1px;
    line-height: 1;
  }
  .logo-wrap .brand span {
    color: var(--gold);
  }
  .logo-wrap .sub {
    font-size: 0.75rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-top: 0.4rem;
  }

  .choose-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    color: var(--text-mid);
    margin-bottom: 2rem;
    text-align: center;
    animation: fadeDown 0.7s 0.15s ease both;
  }

  .lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.7s 0.25s ease both;
  }

  .lang-btn {
    background: var(--white);
    border: 2px solid var(--warm-beige);
    border-radius: 16px;
    padding: 1.4rem 1rem;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }
  .lang-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,169,110,0.12), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .lang-btn:hover, .lang-btn:focus {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(58,46,36,0.13);
  }
  .lang-btn:hover::after { opacity: 1; }
  .lang-btn:active { transform: translateY(-1px); }

  .lang-flag {
    font-size: 2.6rem;
    line-height: 1;
  }
  .lang-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--dark-brown);
    font-weight: 700;
  }
  .lang-native {
    font-size: 0.7rem;
    color: var(--text-mid);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .contact-bar {
    margin-top: 2.5rem;
    display: flex;
    gap: 1.2rem;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 0.7s 0.4s ease both;
  }

    font-size: 0.78rem;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

    animation: fadeIn 0.5s ease;
  }

  .menu-header {

    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .menu-header::before {
    content: '';
    position: absolute;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.2) 0%, transparent 70%);
  }

  .back-btn {
    position: absolute;
    top: 1.2rem; left: 1.2rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 40px; height: 40px;

    cursor: pointer;
    color: var(--gold-light);
    font-size: 1.1rem;
    text-decoration: none;
    transition: all 0.2s;

    margin-bottom: 0.3rem;

    letter-spacing: -0.5px;

  .menu-header .sub {

    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-top: 0.2rem;
  }

  .header-contacts {
    margin-top: 1rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;

    letter-spacing: 0.05em;

  .menu-body {

    display: flex;
    align-items: center;
    gap: 0.5rem;

  .service-list {

    box-shadow: 0 2px 12px rgba(58,46,36,0.07);

    display: flex;

    padding: 0.75rem 1.1rem;
    border-bottom: 1px solid var(--warm-beige);
    gap: 0.5rem;

  .service-name {
    font-size: 0.85rem;
    color: var(--text-dark);
    line-height: 1.3;
    flex: 1;
  }
  .service-meta {

    gap: 0.8rem;
    flex-shrink: 0;
  }
  .service-duration {
    font-size: 0.7rem;
    color: var(--text-mid);
    white-space: nowrap;
  }
  .service-price {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: var(--accent);
    font-size: 0.95rem;
    white-space: nowrap;
    min-width: 40px;
    text-align: right;

    background: var(--white);
    border-radius: 12px;
    padding: 1.2rem 1.2rem 1rem;
    margin-bottom: 0.8rem;

  .ritual-name {

    font-size: 1.05rem;

  .ritual-price {

  .ritual-desc {

    color: var(--text-mid);
    line-height: 1.5;

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to { opacity: 1; transform: translateY(0); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {

    max-width: 140px;
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid var(--warm-beige);
    box-shadow: 0 3px 12px rgba(58,46,36,0.1);
    transition: all 0.22s ease;

    transform: translateY(-3px);
    box-shadow: 0 8px 22px rgba(58,46,36,0.18);

    height: 90px;
    object-fit: cover;
    display: block;

    font-size: 0.62rem;
    text-align: center;
    padding: 0.3rem 0.4rem;

    letter-spacing: 0.04em;
    background: var(--white);

    top: 4px; right: 4px;
    background: rgba(58,46,36,0.55);
    color: white;
    border-radius: 4px;
    font-size: 0.65rem;
    padding: 1px 4px;
    pointer-events: none;

    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,14,10,0.88);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 1rem;

  #lightbox-img {

    max-height: 90vh;
    border-radius: 10px;

    color: white;
    font-size: 1.5rem;

  #lightbox-nav {
    position: fixed;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.6rem;

    padding: 0.4rem 1rem;

  }

  #lightbox-nav button:disabled { opacity: 0.3; cursor: default; }
</style>

// ── TRIPTYCH CONFIG ──
// The PDFs are embedded as base64 images rendered server-side.
// Since we can't load PDF binary in a static page, we use the PDF file paths
// converted to object URLs via fetch+blob, OR we render them as <object> fallback.
// For QR scan use: host the PDFs alongside the HTML and reference by filename.

const triptychFiles = {
  es: { pages: ['ES_p1.jpg','ES_p2.jpg'], labels: ['Página 1','Página 2'] },
  ca: { pages: ['CAT_p1.jpg','CAT_p2.jpg'], labels: ['Pàgina 1','Pàgina 2'] },
  en: { pages: ['EN_p1.jpg','EN_p2.jpg'], labels: ['Page 1','Page 2'] },
  fr: { pages: ['FR_p1.jpg','FR_p2.jpg'], labels: ['Page 1','Page 2'] },
  nl: { pages: ['NL_p1.jpg','NL_p2.jpg'], labels: ['Pagina 1','Pagina 2'] },
};

// Labels per language for the triptych section title
const triptychSectionLabels = {
  es: 'Toca para ver el tríptico completo',
  ca: 'Toca per veure el tríptic complet',
  en: 'Tap to view the full brochure',
  fr: 'Appuyez pour voir le dépliant complet',
  nl: 'Tik om de volledige folder te bekijken',
};

const triptychPageLabels = {
  es: ['Interior','Exterior'],
  ca: ['Interior','Exterior'],
  en: ['Inside','Outside'],
  fr: ['Intérieur','Extérieur'],
  nl: ['Binnen','Buiten'],
};

let currentLang = 'es';
let lbImages = [];
let lbIndex = 0;

function buildTriptychSection(lang) {
  const tf = triptychFiles[lang];
  const pl = triptychPageLabels[lang];
  const label = triptychSectionLabels[lang];
  lbImages = tf.pages;

  // Build two thumbnail cards pointing to the PDF images
  // We use the PDF directly via <object> as thumbnail fallback,
  // but for lightbox we open the image fullscreen.
  // Since PDFs are the source files, we embed them as PDF objects for thumbnails.

  const pdfFiles = { es:'ES.pdf', ca:'CAT.pdf', en:'EN.pdf', fr:'FR.pdf', nl:'NL.pdf' };
  const pdf = pdfFiles[lang];

  return `
    <div class="triptych-section">
      <div class="section-title" style="justify-content:center;border-bottom:none;margin-bottom:0.3rem;">
        <span class="icon">📄</span>${lang==='es'?'Tríptico':lang==='ca'?'Tríptic':lang==='fr'?'Dépliant':lang==='nl'?'Folder':'Brochure'}
      </div>
      <div class="triptych-label">${label}</div>
      <div class="triptych-thumbs">
        ${[0,1].map(i => `
          <div class="triptych-thumb" onclick="openLightboxPdf('${pdf}', ${i})">
            <div class="zoom-icon">🔍</div>
            <object data="${pdf}#page=${i+1}" type="application/pdf"
              style="width:100%;height:90px;pointer-events:none;border:none;overflow:hidden;"
              aria-label="${pl[i]}">
              <div style="height:90px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;">📄</div>
            </object>
            <div class="thumb-label">${pl[i]}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

let currentPdf = '';

function openLightboxPdf(pdfFile, pageIndex) {
  currentPdf = pdfFile;
  lbIndex = pageIndex;
  const lb = document.getElementById('lightbox');
  const iframe = document.getElementById('lightbox-iframe');
  iframe.src = pdfFile + '#page=' + (pageIndex + 1) + '&toolbar=0&navpanes=0&scrollbar=0&view=FitH';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
  updateNavBtns();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-iframe').src = '';
  document.body.style.overflow = '';
}

function lbPrev() {
  if (lbIndex > 0) { lbIndex--; openLightboxPdf(currentPdf, lbIndex); }
}
function lbNext() {
  if (lbIndex < 1) { lbIndex++; openLightboxPdf(currentPdf, lbIndex); }
}

function updateNavBtns() {
  document.getElementById('lb-prev').disabled = lbIndex === 0;
  document.getElementById('lb-next').disabled = lbIndex === 1;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbPrev();
  if (e.key === 'ArrowRight') lbNext();
});

// Override showMenu to also inject triptych
function showMenu(lang) {
  currentLang = lang;
  const d = data[lang];
  document.getElementById('lang-screen').style.display = 'none';
  document.getElementById('menu-content').style.display = 'block';
  document.getElementById('hdr-flag').textContent = d.flag;
  if (lang === 'ca') {
    document.getElementById('hdr-flag').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="40" height="27" style="border-radius:3px;vertical-align:middle;"><rect width="900" height="600" fill="#FCDD09"/><rect y="0" width="900" height="75" fill="#DA121A"/><rect y="150" width="900" height="75" fill="#DA121A"/><rect y="300" width="900" height="75" fill="#DA121A"/><rect y="450" width="900" height="75" fill="#DA121A"/><rect y="525" width="900" height="75" fill="#DA121A"/></svg>`;
  }

  let html = '';
  d.sections.forEach(sec => {
    html += `<div class="section-title"><span class="icon">${sec.icon}</span>${sec.title}</div>`;
    if (sec.type === 'rituals') {
      sec.items.forEach(it => {
        html += `<div class="ritual-card">
          <div class="ritual-name">${it.name}</div>
          <div class="ritual-price">${it.price}</div>
          <div class="ritual-desc">${it.desc}</div>
        </div>`;
      });
    } else {
      html += '<div class="service-list">';
      sec.items.forEach(it => {
        html += `<div class="service-item">
          <span class="service-name">${it.name}</span>
          <span class="service-meta">
            ${it.duration ? `<span class="service-duration">${it.duration}</span>` : ''}
            <span class="service-price">${it.price}</span>
          </span>
        </div>`;
      });
      html += '</div>';
    }
  });

  // Add triptych thumbnails at the end
  html += buildTriptychSection(lang);

  document.getElementById('menu-body').innerHTML = html;
  window.scrollTo(0,0);
}
</script>

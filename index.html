// в”Ђв”Ђ TRIPTYCH CONFIG в”Ђв”Ђ
// The PDFs are embedded as base64 images rendered server-side.
// Since we can't load PDF binary in a static page, we use the PDF file paths
// converted to object URLs via fetch+blob, OR we render them as <object> fallback.
// For QR scan use: host the PDFs alongside the HTML and reference by filename.

const triptychFiles = {
  es: { pages: ['ES_p1.jpg','ES_p2.jpg'], labels: ['PГЎgina 1','PГЎgina 2'] },
  ca: { pages: ['CAT_p1.jpg','CAT_p2.jpg'], labels: ['PГ gina 1','PГ gina 2'] },
  en: { pages: ['EN_p1.jpg','EN_p2.jpg'], labels: ['Page 1','Page 2'] },
  fr: { pages: ['FR_p1.jpg','FR_p2.jpg'], labels: ['Page 1','Page 2'] },
  nl: { pages: ['NL_p1.jpg','NL_p2.jpg'], labels: ['Pagina 1','Pagina 2'] },
};

// Labels per language for the triptych section title
const triptychSectionLabels = {
  es: 'Toca para ver el trГ­ptico completo',
  ca: 'Toca per veure el trГ­ptic complet',
  en: 'Tap to view the full brochure',
  fr: 'Appuyez pour voir le dГ©pliant complet',
  nl: 'Tik om de volledige folder te bekijken',
};

const triptychPageLabels = {
  es: ['Interior','Exterior'],
  ca: ['Interior','Exterior'],
  en: ['Inside','Outside'],
  fr: ['IntГ©rieur','ExtГ©rieur'],
  nl: ['Binnen','Buiten'],
};

let currentLang = 'es';
let lbImages = [];
let lbIndex = 0;

const imgFiles = {
  es: ['ES_p1.jpg','ES_p2.jpg'],
  ca: ['CAT_p1.jpg','CAT_p2.jpg'],
  en: ['EN_p1.jpg','EN_p2.jpg'],
  fr: ['FR_p1.jpg','FR_p2.jpg'],
  nl: ['NL_p1.jpg','NL_p2.jpg'],
};

function buildTriptychSection(lang) {
  const pl = triptychPageLabels[lang];
  const label = triptychSectionLabels[lang];
  const imgs = imgFiles[lang];
  lbImages = imgs;
  const title = lang==='es'?'TrГ­ptico':lang==='ca'?'TrГ­ptic':lang==='fr'?'DГ©pliant':lang==='nl'?'Folder':'Brochure';
  return `
    <div class="triptych-section">
      <div class="section-title" style="justify-content:center;border-bottom:none;margin-bottom:0.3rem;">
        <span class="icon">рџ“„</span>${title}
      </div>
      <div class="triptych-label">${label}</div>
      <div class="triptych-thumbs">
        ${imgs.map((img, i) => `
          <div class="triptych-thumb" onclick="openLightboxImg(${i})">
            <div class="zoom-icon">рџ”Ќ</div>
            <img src="${img}" alt="${pl[i]}" style="width:100%;height:90px;object-fit:cover;display:block;pointer-events:none;" />
            <div class="thumb-label">${pl[i]}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function openLightboxImg(index) {
  lbIndex = index;
  document.getElementById('lightbox-img').src = lbImages[index];
  window._scrollY = window.scrollY;
  document.body.style.position = 'fixed';
  document.body.style.top = '-' + window._scrollY + 'px';
  document.body.style.left = '0';
  document.body.style.right = '0';
  document.getElementById('lightbox').classList.add('open');
  updateNavBtns();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  const img = document.getElementById('lightbox-img');
  if (img) img.src = '';
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  window.scrollTo(0, window._scrollY || 0);
}

function lbPrev() {
  if (lbIndex > 0) { lbIndex--; openLightboxImg(lbIndex); }
}
function lbNext() {
  if (lbIndex < 1) { lbIndex++; openLightboxImg(lbIndex); }
}

function updateNavBtns() {
  document.getElementById('lb-prev').disabled = lbIndex === 0;
  document.getElementById('lb-next').disabled = lbIndex === 1;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbPrev();
  if (e.key === 'ArrowRight') lbNext();
});

// Override showMenu to also inject triptych
function showMenu(lang) {
  currentLang = lang;
  const d = data[lang];
  document.getElementById('lang-screen').style.display = 'none';
  document.getElementById('menu-content').style.display = 'block';
  document.getElementById('hdr-flag').textContent = d.flag;
  if (lang === 'ca') {
    document.getElementById('hdr-flag').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="40" height="27" style="border-radius:3px;vertical-align:middle;"><rect width="900" height="600" fill="#FCDD09"/><rect y="0" width="900" height="75" fill="#DA121A"/><rect y="150" width="900" height="75" fill="#DA121A"/><rect y="300" width="900" height="75" fill="#DA121A"/><rect y="450" width="900" height="75" fill="#DA121A"/><rect y="525" width="900" height="75" fill="#DA121A"/></svg>`;
  }

  let html = '';
  d.sections.forEach(sec => {
    html += `<div class="section-title"><span class="icon">${sec.icon}</span>${sec.title}</div>`;
    if (sec.type === 'rituals') {
      sec.items.forEach(it => {
        html += `<div class="ritual-card">
          <div class="ritual-name">${it.name}</div>
          <div class="ritual-price">${it.price}</div>
          <div class="ritual-desc">${it.desc}</div>
        </div>`;
      });
    } else {
      html += '<div class="service-list">';
      sec.items.forEach(it => {
        html += `<div class="service-item">
          <span class="service-name">${it.name}</span>
          <span class="service-meta">
            ${it.duration ? `<span class="service-duration">${it.duration}</span>` : ''}
            <span class="service-price">${it.price}</span>
          </span>
        </div>`;
      });
      html += '</div>';
    }
  });

  // Add triptych thumbnails at the end
  html += buildTriptychSection(lang);

  document.getElementById('menu-body').innerHTML = html;
  window.scrollTo(0,0);
}
</script>
